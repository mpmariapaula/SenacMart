<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SenacMart — Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-box">
      <div class="login-logo">SenacMart</div>
      <div class="login-sub">Sistema de simulação de caixa</div>

      <h2>Identificação do operador</h2>

      <form action="login.php" method="POST">
        <div class="login-campo">
          <label for="nome">Seu nome</label>
          <input type="text" id="nome" name="nome" placeholder="Ex: Ana Silva" required autofocus>
        </div>
        <button type="submit" class="btn btn-primario">Entrar no caixa</button>
      </form>

      <p class="login-rodape">Informe seu nome para registrar as vendas corretamente.</p>
    </div>
  </div>
</body>
</html>
